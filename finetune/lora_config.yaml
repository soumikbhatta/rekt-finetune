# MLX-LM LoRA fine-tuning config
# Docs: https://github.com/ml-explore/mlx-lm

# Model — swap 2B for 4B when you want more quality at the cost of speed
model: mlx-community/Qwen3.5-2B-4bit

# Data
train: true
data: data/finetune        # must contain train.jsonl and valid.jsonl

# Reproducibility
seed: 42

# LoRA settings
# lora_layers: number of transformer layers to apply LoRA to.
# Higher = more expressive but slower. 16 is a good default.
lora_layers: 16

# Training
batch_size: 4
iters: 1000

# Validation
val_batches: 25

# Optimizer
learning_rate: 1.0e-4

# Logging
steps_per_report: 10
steps_per_eval: 100

# Adapter output — LoRA weights only (~10 MB, NOT the full model)
adapter_path: adapters/
